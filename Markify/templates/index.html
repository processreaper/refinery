<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>File → Markdown Converter</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f0f13;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
    }

    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      margin-bottom: 0.25rem;
      background: linear-gradient(135deg, #818cf8, #c084fc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      color: #64748b;
      font-size: 0.9rem;
      margin-bottom: 2rem;
    }

    .container {
      width: 100%;
      max-width: 860px;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }

    /* Drop zone */
    #drop-zone {
      border: 2px dashed #334155;
      border-radius: 16px;
      padding: 3rem 2rem;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      background: #161622;
    }

    #drop-zone.drag-over {
      border-color: #818cf8;
      background: #1a1a2e;
    }

    #drop-zone svg {
      width: 48px;
      height: 48px;
      color: #475569;
      margin-bottom: 1rem;
    }

    #drop-zone p {
      color: #94a3b8;
      margin-bottom: 0.5rem;
    }

    #drop-zone .hint {
      font-size: 0.8rem;
      color: #475569;
    }

    .pill-btn {
      display: inline-block;
      margin-top: 1rem;
      padding: 0.5rem 1.25rem;
      border-radius: 999px;
      background: #818cf8;
      color: #fff;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }

    .pill-btn:hover { background: #6366f1; }

    #file-input { display: none; }

    /* Status bar */
    #status {
      display: none;
      align-items: center;
      gap: 0.75rem;
      padding: 0.75rem 1rem;
      border-radius: 10px;
      background: #1e293b;
      font-size: 0.875rem;
    }

    #status.visible { display: flex; }
    #status.error { background: #3b0f0f; color: #f87171; }
    #status.success { background: #0f2d1e; color: #4ade80; }
    #status.loading { color: #94a3b8; }

    .spinner {
      width: 18px; height: 18px;
      border: 2px solid #334155;
      border-top-color: #818cf8;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Output area */
    #output-section {
      display: none;
      flex-direction: column;
      gap: 0.75rem;
    }

    #output-section.visible { display: flex; }

    .output-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .output-label {
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      color: #64748b;
      text-transform: uppercase;
    }

    .action-btns {
      display: flex;
      gap: 0.5rem;
    }

    .action-btn {
      padding: 0.35rem 0.9rem;
      border-radius: 8px;
      font-size: 0.8rem;
      font-weight: 600;
      border: none;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .action-btn:hover { opacity: 0.85; }

    .btn-copy { background: #1e293b; color: #94a3b8; }
    .btn-download { background: #818cf8; color: #fff; }

    #markdown-output {
      width: 100%;
      min-height: 420px;
      padding: 1.25rem;
      border-radius: 12px;
      background: #161622;
      border: 1px solid #1e293b;
      color: #e2e8f0;
      font-family: "JetBrains Mono", "Fira Code", "Menlo", monospace;
      font-size: 0.82rem;
      line-height: 1.65;
      resize: vertical;
      outline: none;
    }

    #markdown-output:focus { border-color: #818cf8; }

    .copied-toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%) translateY(10px);
      background: #4ade80;
      color: #0f2d1e;
      padding: 0.5rem 1.25rem;
      border-radius: 999px;
      font-size: 0.85rem;
      font-weight: 600;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s, transform 0.25s;
    }

    .copied-toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>
<body>
  <h1>File → Markdown</h1>
  <p class="subtitle">Drag & drop or upload — supports PDF, Word, PowerPoint, and text files</p>

  <div class="container">
    <div id="drop-zone">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
          d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5" />
      </svg>
      <p>Drop your file here</p>
      <p class="hint">PDF · DOCX · PPTX · TXT · MD (max 50 MB)</p>
      <label class="pill-btn" for="file-input">Choose file</label>
      <input type="file" id="file-input"
        accept=".pdf,.doc,.docx,.ppt,.pptx,.txt,.md" />
    </div>

    <div id="status"></div>

    <div id="output-section">
      <div class="output-header">
        <span class="output-label">Markdown output</span>
        <div class="action-btns">
          <button class="action-btn btn-copy" onclick="copyMarkdown()">Copy</button>
          <button class="action-btn btn-download" onclick="downloadMarkdown()">Download .md</button>
        </div>
      </div>
      <textarea id="markdown-output" spellcheck="false"></textarea>
    </div>
  </div>

  <div class="copied-toast" id="toast">Copied!</div>

  <script>
    const dropZone   = document.getElementById("drop-zone");
    const fileInput  = document.getElementById("file-input");
    const status     = document.getElementById("status");
    const outputSec  = document.getElementById("output-section");
    const mdOutput   = document.getElementById("markdown-output");
    const toast      = document.getElementById("toast");

    let currentFilename = "output";

    // Drag events
    ["dragenter", "dragover"].forEach(e =>
      dropZone.addEventListener(e, ev => { ev.preventDefault(); dropZone.classList.add("drag-over"); }));

    ["dragleave", "dragend", "drop"].forEach(e =>
      dropZone.addEventListener(e, ev => { ev.preventDefault(); dropZone.classList.remove("drag-over"); }));

    dropZone.addEventListener("drop", ev => {
      const file = ev.dataTransfer.files[0];
      if (file) handleFile(file);
    });

    fileInput.addEventListener("change", () => {
      if (fileInput.files[0]) handleFile(fileInput.files[0]);
    });

    function setStatus(type, message) {
      status.className = `visible ${type}`;
      if (type === "loading") {
        status.innerHTML = `<div class="spinner"></div><span>${message}</span>`;
      } else {
        const icon = type === "error" ? "✕" : "✓";
        status.innerHTML = `<span>${icon} ${message}</span>`;
      }
    }

    async function handleFile(file) {
      currentFilename = file.name.replace(/\.[^.]+$/, "");
      outputSec.classList.remove("visible");
      setStatus("loading", `Converting ${file.name}…`);

      const form = new FormData();
      form.append("file", file);

      try {
        const res = await fetch("/convert", { method: "POST", body: form });
        const data = await res.json();

        if (!res.ok || data.error) {
          setStatus("error", data.error || "Conversion failed");
          return;
        }

        mdOutput.value = data.markdown;
        outputSec.classList.add("visible");
        setStatus("success", `Converted "${file.name}" successfully`);
      } catch (err) {
        setStatus("error", "Network error — is the server running?");
      }
    }

    function copyMarkdown() {
      navigator.clipboard.writeText(mdOutput.value).then(() => {
        toast.classList.add("show");
        setTimeout(() => toast.classList.remove("show"), 2000);
      });
    }

    function downloadMarkdown() {
      const blob = new Blob([mdOutput.value], { type: "text/markdown" });
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = `${currentFilename}.md`;
      a.click();
    }
  </script>
</body>
</html>
